---
- name: Install gmid
  ansible.builtin.apt:
    name: gmid
    state: present

- name: Create gmid user
  ansible.builtin.user:
    name: "{{ gemini_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create capsule root
  ansible.builtin.file:
    path: "{{ gemini_capsule_root }}"
    state: directory
    owner: "{{ gemini_user }}"
    mode: "0755"

- name: Deploy gmid config
  ansible.builtin.template:
    src: gmid.conf.j2
    dest: /etc/gmid.conf
    mode: "0644"
  notify: restart gmid

- name: Enable gmid service
  ansible.builtin.systemd:
    name: gmid
    enabled: true
    state: started

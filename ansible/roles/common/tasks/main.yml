---
# {{ ansible_managed }}

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base system packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Apply geerlingguy.ntp role
  ansible.builtin.include_role:
    name: geerlingguy.ntp

- name: Deploy sysctl hardening
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/99-pubnix.conf
    mode: "0644"
    validate: "sysctl -p %s"
  notify: reload sysctl

- name: Configure journald caps
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?SystemMaxUse='
    line: 'SystemMaxUse=1G'
    state: present
  notify: restart journald

- name: Apply robertdebock.logrotate role
  ansible.builtin.include_role:
    name: robertdebock.logrotate
  vars:
    logrotate_entries: "{{ logrotate_entries | default([]) }}"
